version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-task-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - smart-task-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-task-frontend
    ports:
      - "5173:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - smart-task-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: smart-task-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=smarttask
      - POSTGRES_PASSWORD=smarttask_secret
      - POSTGRES_DB=smarttask_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-task-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarttask -d smarttask_db"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: smart-task-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - MP_SMTP_AUTH_ALLOW_ANY=true
    networks:
      - smart-task-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  smart-task-network:
    driver: bridge
